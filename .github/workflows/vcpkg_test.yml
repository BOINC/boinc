name: vcpkg test
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron:  '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
    get-hash:
        name: Get hash
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
            with:
              fetch-depth: 2
          - name: Download revision archive
            run: |
              curl -L -o boinc.tar.gz https://github.com/BOINC/boinc/archive/${GITHUB_REF}.tar.gz
          - name: Get hash
            id: get_hash
            run: |
              echo "revision_hash=$(sha512sum boinc.tar.gz | awk '{ print $1 }')" >> $GITHUB_OUTPUT
    linux:
      name: Linux
      runs-on: ubuntu-latest
      needs: get-hash
      strategy:
        matrix:
          triplet: [ 'arm-linux', 'arm64-linux', 'x64-linux', 'x86-linux' ]
        fail-fast: false
      steps:
        - name: Checkout
          uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
          with:
            fetch-depth: 2

        - name: Install x86 dependencies
          if: ${{ matrix.triplet == 'x86-linux' }}
          run: |
            sudo apt-get update
            sudo apt-get install -y g++-multilib gcc-multilib

        - name: Install arm dependencies
          if: ${{ matrix.triplet == 'arm-linux' }}
          run: |
            sudo apt-get update
            sudo apt-get install -y g++-arm-linux-gnueabihf gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

        - name: Install arm64 dependencies
          if: ${{ matrix.triplet == 'arm64-linux' }}
          run: |
            sudo apt-get update
            sudo apt-get install -y g++-aarch64-linux-gnu gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
        - name: Check if build is running from origin repo
          if: ${{ success() && env.AWS_ACCESS_KEY_ID != 0 && env.AWS_SECRET_ACCESS_KEY != 0 }}
          run: |
            echo "VCPKG_BINARY_SOURCES=clear;x-aws,s3://vcpkg.cache.boinc/,readwrite" >> $GITHUB_ENV

        - name: Check if build is running from fork
          if: ${{ success() && (env.AWS_ACCESS_KEY_ID == 0 || env.AWS_SECRET_ACCESS_KEY == 0) }}
          run: |
            echo "VCPKG_BINARY_SOURCES=clear;x-aws-config,no-sign-request;x-aws,s3://vcpkg.cache.boinc/,read" >> $GITHUB_ENV

        - name: Fix portfile
          run: |
            python ./tests/vcpkg/portfilefix.py ${GITHUB_REF} ${{ needs.get-hash.outputs.revision_hash }}

        - name: Set up vcpkg
          run: |
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh

        - name: Prepare build
          run: |
            mkdir -p tests/vcpkg/build

        - name: Configure arm build
          if: ${{ matrix.triplet == 'arm-linux' }}
          run: |
            cmake -E env CC="arm-linux-gnueabihf-gcc" CXX="arm-linux-gnueabihf-g++" LD="arm-linux-gnueabihf-ld" CFLAGS="-march=armv7-a" CXXFLAGS="-march=armv7-a" LDFLAGS="-march=armv7-a" cmake -B tests/vcpkg/build -S -DVCPKG_TARGET_ARCHITECTURE=${{ matrix.triplet }} tests/vcpkg/

        - name: Configure arm64 build
          if: ${{ matrix.triplet == 'arm64-linux' }}
          run: |
            cmake -E env CC="aarch64-linux-gnu-gcc" CXX="aarch64-linux-gnu-g++" LD="aarch64-linux-gnu-ld" CFLAGS="-march=armv8-a" CXXFLAGS="-march=armv8-a" LDFLAGS="-march=armv8-a" cmake -B tests/vcpkg/build -S -DVCPKG_TARGET_ARCHITECTURE=${{ matrix.triplet }} tests/vcpkg/

        - name: Configure x64 build
          if: ${{ matrix.triplet == 'x64-linux' }}
          run: |
            cmake -E env CFLAGS="-march=64" CXXFLAGS="-march=64" LDFLAGS="-march=64" cmake -B tests/vcpkg/build -S -DVCPKG_TARGET_ARCHITECTURE=${{ matrix.triplet }} tests/vcpkg/

        - name: Configure x86 build
          if: ${{ matrix.triplet == 'x86-linux' }}
          run: |
            cmake -E env CFLAGS="-march=32" CXXFLAGS="-march=32" LDFLAGS="-march=32" cmake -B tests/vcpkg/build -S -DVCPKG_TARGET_ARCHITECTURE=${{ matrix.triplet }} tests/vcpkg/

        - name: Build
          run: |
            cmake --build tests/vcpkg/build --config Release
