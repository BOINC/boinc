name: vcpkg test
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron:  '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
    get-hash:
        name: Get hash
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
            with:
              fetch-depth: 2
          - name: Download revision archive
            run: |
              curl -L -o boinc.tar.gz https://github.com/BOINC/boinc/archive/${GITHUB_REF}.tar.gz
          - name: Get hash
            id: get_hash
            run: |
              echo "hash=$(sha512sum boinc.tar.gz | awk '{ print $1 }')" >> $GITHUB_ENV
